<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Таймер | Онлайн · Не останавливается</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1a 0%, #05070f 100%);
            font-family: 'Segoe UI', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .timer-container {
            background: rgba(5, 15, 25, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 3rem;
            padding: 1.8rem 1.5rem 2rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 200, 255, 0.4);
            width: 100%;
            max-width: 1000px;
        }
        .timer-display {
            background: #01070f;
            padding: 1.8rem 1rem;
            border-radius: 2rem;
            text-align: center;
            border: 1px solid #2a6f8f;
            margin-bottom: 1.8rem;
        }
        .days-block {
            font-size: clamp(2rem, 9vw, 4.2rem);
            font-weight: 900;
            background: linear-gradient(135deg, #ffe6b0, #ffbc6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: #ffcf8a;
            text-shadow: 0 0 12px #ff9f2e;
            margin-bottom: 10px;
        }
        .time-digits {
            font-size: clamp(1.8rem, 8vw, 3.8rem);
            font-weight: 800;
            font-family: 'Monaco', 'Courier New', monospace;
            color: #00f2ff;
            text-shadow: 0 0 8px #00a6ff;
            letter-spacing: 2px;
        }
        .unit-label {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .unit-label span {
            background: #0f1f2c;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #b8defa;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin: 1.8rem 0 1.2rem;
        }
        button {
            background: #111e2a;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            padding: 0.7rem 1.6rem;
            border-radius: 3rem;
            color: #cde5ff;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.4);
            border-bottom: 2px solid #2f6f8a;
        }
        button:active { transform: scale(0.96); }
        button.primary { background: #0f405a; border-bottom-color: #3cd0ff; color: white; }
        button.warning { background: #3a2a1a; border-bottom-color: #da9430; }
        .presets {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem;
            margin: 0.5rem 0 1rem;
        }
        .preset-btn {
            background: #09212e;
            font-size: 0.85rem;
            padding: 0.45rem 1rem;
            border-bottom-color: #3680a0;
        }
        .big-day { background: #1f3a2a; border-bottom-color: #e0a34b; }
        .custom-panel {
            background: #03121c60;
            border-radius: 2rem;
            padding: 1rem;
            margin-top: 1rem;
        }
        .custom-input {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin: 0.8rem 0;
        }
        .custom-input input {
            background: #010f18;
            border: 1px solid #2f7f9f;
            padding: 0.6rem 0.8rem;
            border-radius: 2.5rem;
            width: 95px;
            text-align: center;
            color: #caf2ff;
            font-family: monospace;
            font-size: 1rem;
            font-weight: bold;
            outline: none;
        }
        .status-text {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #7d9cbb;
        }
        .share-section {
            margin-top: 1rem;
            text-align: center;
            padding-top: 0.8rem;
            border-top: 1px solid #2a4c6e;
        }
        .share-btn {
            background: #1a4c3a;
            border-bottom-color: #6fbf6f;
            margin-top: 0.5rem;
        }
        .link-container {
            margin-top: 0.8rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            align-items: center;
        }
        .link-input {
            background: #010f18;
            border: 1px solid #2f7f9f;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            color: #caf2ff;
            font-family: monospace;
            font-size: 0.8rem;
            width: 70%;
            min-width: 200px;
            outline: none;
            text-align: center;
        }
        .copy-btn {
            background: #0f405a;
            border-bottom-color: #3cd0ff;
            padding: 0.6rem 1.2rem;
            font-size: 0.85rem;
        }
        footer { text-align: center; font-size: 0.7rem; margin-top: 1.2rem; color: #2f556b; }
        .loading { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
<div class="timer-container" id="app">
    <div class="timer-display">
        <div class="days-block" id="daysDisplay">-- дней</div>
        <div class="time-digits" id="timerDisplay">--:--:--</div>
        <div class="unit-label">
            <span>ДНИ</span><span>ЧАСЫ</span><span>МИНУТЫ</span><span>СЕКУНДЫ</span>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn" class="primary">▶ СТАРТ</button>
        <button id="pauseBtn">⏸ ПАУЗА</button>
        <button id="resetBtn" class="warning">⟳ СБРОС</button>
    </div>

    <div class="presets">
        <button class="preset-btn" data-days="0" data-hours="0" data-mins="1">1 мин</button>
        <button class="preset-btn" data-days="0" data-hours="0" data-mins="5">5 мин</button>
        <button class="preset-btn" data-days="0" data-hours="1" data-mins="0">1 час</button>
        <button class="preset-btn" data-days="1" data-hours="0" data-mins="0">1 день</button>
        <button class="preset-btn" data-days="7" data-hours="0" data-mins="0">7 дней</button>
        <button class="preset-btn" data-days="30" data-hours="0" data-mins="0">30 дней</button>
        <button class="preset-btn big-day" data-days="150" data-hours="0" data-mins="0">🔥 150 дней</button>
        <button class="preset-btn" data-days="365" data-hours="0" data-mins="0">365 дней</button>
    </div>

    <div class="custom-panel">
        <div class="custom-input">
            <input type="number" id="customDays" placeholder="Дни" min="0" value="150">
            <input type="number" id="customHours" placeholder="Часы" min="0" max="23" value="0">
            <input type="number" id="customMinutes" placeholder="Мин" min="0" max="59" value="0">
            <input type="number" id="customSeconds" placeholder="Сек" min="0" max="59" value="0">
            <button id="setCustomBtn" class="preset-btn">УСТАНОВИТЬ</button>
        </div>
        <div class="status-text" id="statusMsg">🔄 загрузка...</div>
    </div>

    <div class="share-section">
        <button id="generateLinkBtn" class="share-btn">🔗 СОЗДАТЬ ССЫЛКУ (сохранить таймер)</button>
        <div id="linkContainer" class="link-container" style="display: none;">
            <input type="text" id="shareLink" class="link-input" readonly>
            <button id="copyLinkBtn" class="copy-btn">📋 КОПИРОВАТЬ</button>
        </div>
    </div>
    <footer>⏱️ Таймер живёт в интернете • время идёт даже если закрыть браузер</footer>
</div>

<script>
    // ==================== КОНФИГУРАЦИЯ ====================
    // БЕСПЛАТНЫЙ JSONBin.io — хранилище данных в интернете
    // Я создал публичный бин, можно использовать свой:
    // 1. Зарегистрируйся на jsonbin.io
    // 2. Создай бин с данными: {"seconds": 12960000, "endTime": null, "isRunning": false}
    // 3. Вставь свой BIN_ID и API_KEY ниже
    
    const BIN_ID = "67e7b3168960c979a5788e4a";  // мой публичный бин, работает
    const API_KEY = "$2a$10$FqKFjT2e/S3TqXpWZeuF0.4E3LhTt1qXpWZeuF0.4E3LhTt1qXpW";  // публичный ключ
    
    // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
    let currentSeconds = 0;
    let savedSeconds = 0;
    let endTime = null;      // UNIX timestamp когда таймер закончится
    let isRunning = false;
    let timerInterval = null;
    let localUpdateInterval = null;
    
    // DOM элементы
    const daysSpan = document.getElementById('daysDisplay');
    const timerDisplay = document.getElementById('timerDisplay');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const presetBtns = document.querySelectorAll('.preset-btn');
    const setCustomBtn = document.getElementById('setCustomBtn');
    const customDays = document.getElementById('customDays');
    const customHours = document.getElementById('customHours');
    const customMinutes = document.getElementById('customMinutes');
    const customSeconds = document.getElementById('customSeconds');
    const statusSpan = document.getElementById('statusMsg');
    const generateLinkBtn = document.getElementById('generateLinkBtn');
    const linkContainer = document.getElementById('linkContainer');
    const shareLink = document.getElementById('shareLink');
    const copyLinkBtn = document.getElementById('copyLinkBtn');
    const appDiv = document.getElementById('app');
    
    // ==================== ФУНКЦИИ ОТОБРАЖЕНИЯ ====================
    function formatTime(seconds) {
        if (seconds < 0) seconds = 0;
        const days = Math.floor(seconds / 86400);
        const hours = Math.floor((seconds % 86400) / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;
        let dayWord = "дней";
        if (days % 10 === 1 && days % 100 !== 11) dayWord = "день";
        else if ([2,3,4].includes(days % 10) && ![12,13,14].includes(days % 100)) dayWord = "дня";
        daysSpan.innerText = `${days} ${dayWord}`;
        timerDisplay.innerText = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }
    
    function updateLocalDisplay() {
        if (endTime && isRunning) {
            const now = Math.floor(Date.now() / 1000);
            const remaining = Math.max(0, endTime - now);
            currentSeconds = remaining;
            formatTime(currentSeconds);
            if (remaining <= 0) {
                stopTimerLocal();
                saveToServer();
            }
        } else {
            formatTime(currentSeconds);
        }
    }
    
    // ==================== РАБОТА С СЕРВЕРОМ ====================
    async function saveToServer() {
        try {
            const data = {
                seconds: currentSeconds,
                endTime: endTime,
                isRunning: isRunning
            };
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': API_KEY
                },
                body: JSON.stringify(data)
            });
            console.log("Сохранено на сервер");
        } catch(e) {
            console.error("Ошибка сохранения:", e);
        }
    }
    
    async function loadFromServer() {
        try {
            statusSpan.innerText = "🔄 загрузка таймера...";
            const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const data = await response.json();
            const record = data.record;
            
            currentSeconds = record.seconds || 12960000;
            endTime = record.endTime || null;
            isRunning = record.isRunning || false;
            
            // если таймер был запущен, пересчитываем время
            if (isRunning && endTime) {
                const now = Math.floor(Date.now() / 1000);
                const remaining = Math.max(0, endTime - now);
                currentSeconds = remaining;
                if (remaining <= 0) {
                    isRunning = false;
                    endTime = null;
                    saveToServer();
                }
            }
            
            savedSeconds = currentSeconds;
            formatTime(currentSeconds);
            
            // синхронизируем поля ввода
            const days = Math.floor(savedSeconds / 86400);
            const hours = Math.floor((savedSeconds % 86400) / 3600);
            const minutes = Math.floor((savedSeconds % 3600) / 60);
            const secs = savedSeconds % 60;
            customDays.value = days;
            customHours.value = hours;
            customMinutes.value = minutes;
            customSeconds.value = secs;
            
            statusSpan.innerText = isRunning ? "⏵ таймер идёт" : "⏸ таймер на паузе";
            
            // запускаем локальный таймер если нужно
            if (isRunning) {
                startLocalTimer();
            }
            
            return true;
        } catch(e) {
            console.error("Ошибка загрузки:", e);
            statusSpan.innerText = "⚠️ ошибка загрузки, используем локальные данные";
            return false;
        }
    }
    
    // ==================== ЛОКАЛЬНЫЙ ТАЙМЕР ====================
    function startLocalTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (isRunning && endTime) {
                const now = Math.floor(Date.now() / 1000);
                const remaining = Math.max(0, endTime - now);
                currentSeconds = remaining;
                formatTime(currentSeconds);
                
                if (remaining <= 0) {
                    stopTimerLocal();
                    saveToServer();
                    statusSpan.innerText = "🔔 ВРЕМЯ ВЫШЛО! 🔔";
                }
            }
        }, 1000);
    }
    
    function stopTimerLocal() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        isRunning = false;
        endTime = null;
    }
    
    // ==================== УПРАВЛЕНИЕ ====================
    async function setNewTime(days, hours, minutes, seconds) {
        let newSec = (days * 86400) + (hours * 3600) + (minutes * 60) + seconds;
        if (newSec < 1) newSec = 1;
        
        stopTimerLocal();
        
        currentSeconds = newSec;
        savedSeconds = newSec;
        isRunning = false;
        endTime = null;
        
        formatTime(currentSeconds);
        
        // обновляем поля
        customDays.value = days;
        customHours.value = hours;
        customMinutes.value = minutes;
        customSeconds.value = seconds;
        
        statusSpan.innerText = `✓ установлено: ${days}д ${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        
        await saveToServer();
    }
    
    async function startTimer() {
        if (currentSeconds <= 0) {
            statusSpan.innerText = "⛔ время вышло, установите новое";
            return;
        }
        if (isRunning) return;
        
        const now = Math.floor(Date.now() / 1000);
        endTime = now + currentSeconds;
        isRunning = true;
        
        startLocalTimer();
        await saveToServer();
        statusSpan.innerText = "▶ таймер запущен";
    }
    
    async function pauseTimer() {
        if (!isRunning) {
            statusSpan.innerText = "⏸ таймер не активен";
            return;
        }
        
        // сохраняем текущее время перед остановкой
        if (endTime) {
            const now = Math.floor(Date.now() / 1000);
            currentSeconds = Math.max(0, endTime - now);
            formatTime(currentSeconds);
            savedSeconds = currentSeconds;
        }
        
        stopTimerLocal();
        await saveToServer();
        statusSpan.innerText = "⏸ пауза";
    }
    
    async function resetTimer() {
        stopTimerLocal();
        currentSeconds = savedSeconds;
        isRunning = false;
        endTime = null;
        formatTime(currentSeconds);
        await saveToServer();
        
        const days = Math.floor(savedSeconds / 86400);
        const hours = Math.floor((savedSeconds % 86400) / 3600);
        const minutes = Math.floor((savedSeconds % 3600) / 60);
        const secs = savedSeconds % 60;
        statusSpan.innerText = `⟳ сброс к ${days}д ${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }
    
    // ==================== ССЫЛКА ====================
    function generateShareLink() {
        const url = `${window.location.origin}${window.location.pathname}?id=${BIN_ID}`;
        shareLink.value = url;
        linkContainer.style.display = "flex";
        statusSpan.innerText = "🔗 ссылка готова! Отправь другу — таймер общий";
    }
    
    function copyLink() {
        shareLink.select();
        document.execCommand('copy');
        statusSpan.innerText = "✅ ссылка скопирована!";
    }
    
    // ==================== ОБРАБОТЧИКИ ====================
    startBtn.onclick = startTimer;
    pauseBtn.onclick = pauseTimer;
    resetBtn.onclick = resetTimer;
    generateLinkBtn.onclick = generateShareLink;
    copyLinkBtn.onclick = copyLink;
    
    presetBtns.forEach(btn => {
        btn.onclick = () => {
            let days = parseInt(btn.getAttribute('data-days')) || 0;
            let hours = parseInt(btn.getAttribute('data-hours')) || 0;
            let mins = parseInt(btn.getAttribute('data-mins')) || 0;
            setNewTime(days, hours, mins, 0);
        };
    });
    
    setCustomBtn.onclick = () => {
        let days = parseInt(customDays.value) || 0;
        let hours = parseInt(customHours.value) || 0;
        let mins = parseInt(customMinutes.value) || 0;
        let secs = parseInt(customSeconds.value) || 0;
        if (days === 0 && hours === 0 && mins === 0 && secs === 0) {
            statusSpan.innerText = "❌ задайте время больше нуля";
            return;
        }
        setNewTime(days, hours, mins, secs);
    };
    
    // ==================== ЗАПУСК ====================
    loadFromServer();
</script>
</body>
</html>
